<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multicric</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff0080);
    background-size: 400% 400%;
    animation: gradient 8s ease infinite;
    color: white;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.wrapper {
    display: flex;
    justify-content: center;
    padding: 20px 10px;
}

.container {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 22px;
    text-align: center;
}

.brand {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(270deg, #ff0080, #00eaff, #ff4dc4);
    background-size: 600% 600%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientMove 5s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1 { font-size: 20px; margin: 10px 0; }
p { font-size: 13px; color: #ccc; }

.benefits {
    font-size: 13px;
    margin: 12px 0;
    line-height: 1.6;
}

input {
    width: 90%;
    padding: 14px;
    margin: 8px auto;
    border-radius: 10px;
    border: none;
    display: block;
}

.btn {
    width: 90%;
    margin: 10px auto;
    padding: 15px;
    border-radius: 50px;
    font-weight: bold;
    color: white;
    background: linear-gradient(45deg, #ff0080, #ff4dc4);
    border: none;
    cursor: pointer;
}

.link-btn {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 14px;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
}

.small {
    font-size: 12px;
    color: #aaa;
}

.footer {
    font-size: 11px;
    color: #888;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="brand">MULTICRIC</div>

<h1>🔥 Get Free Access 🔥</h1>
<p>Join now & unlock premium tips, live updates & exclusive access</p>

<div class="benefits">
    ✅ Trusted Platform <br>
    ✅ Fast Results <br>
    ✅ Daily Updates <br>
    ⏳ Limited Access Only
</div>

<!-- ✅ WORKING FORM -->
<form id="contactForm">
    <input type="text" id="name" placeholder="Enter Your Name" required>
    <input type="tel" id="phone" placeholder="Enter WhatsApp Number" required>
    <button type="submit" class="btn">🚀 Get Access Now</button>
</form>

<p class="small">🔒 Your details are safe & secure</p>

<a href="https://www.multicric.com/?code=124Sky" class="link-btn">🌐 Visit Website</a>
<a href="https://t.me/multicric124sky" class="link-btn">📲 Join Telegram</a>

<div class="footer">© 2025 multicric</div>

</div>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();

    if(phone.length < 10){
        alert("Enter valid number");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzZ9cRLR-uOS0VbQJp72mp1TjaV7PAaE_g3js3TytCAc6Zk9RuDegZjDBnt_2Y_zZJ3/exec?name=" + name + "&phone=" + phone);

    alert("✅ Access Granted!");

    // redirect
    window.location.href = "https://www.multicric.com/?code=124Sky";
});
</script>

</body>
</html>
