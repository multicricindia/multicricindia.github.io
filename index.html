<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multicric</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

/* Wrapper */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 20px 10px;
}

/* Container */
.container {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 0 35px rgba(255,0,150,0.5);
}

/* 🔥 Animated Gradient Brand */
.brand {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(270deg, #ff0080, #00eaff, #ff4dc4);
    background-size: 600% 600%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientMove 5s ease infinite;
    margin-bottom: 8px;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Heading */
h1 {
    font-size: 20px;
    margin: 8px 0;
}

/* Text */
p {
    font-size: 13px;
    color: #ccc;
    margin: 6px 0;
}

/* Benefits */
.benefits {
    font-size: 13px;
    margin: 12px 0;
    line-height: 1.6;
}

/* Inputs */
input {
    width: 88%;
    padding: 14px;
    margin: 8px auto;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    display: block;
}

/* Buttons */
.btn {
    display: block;
    width: 88%;
    margin: 10px auto;
    padding: 15px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 15px;
    color: white;
    background: linear-gradient(45deg, #ff0080, #ff4dc4);
    box-shadow: 0 0 15px rgba(255,0,150,0.8);
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Small text */
.small {
    font-size: 12px;
    color: #aaa;
    margin-top: 5px;
}

/* Footer */
.footer {
    margin-top: 12px;
    font-size: 11px;
    color: #888;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="container">

    <!-- 🔥 Animated Brand -->
    <div class="brand">MULTICRIC</div>

    <!-- Headline -->
    <h1>🔥 Get Free Access 🔥</h1>

    <!-- Subtext -->
    <p>Join now & unlock premium tips, live updates & exclusive access</p>

    <!-- Benefits -->
    <div class="benefits">
        ✅ Trusted Platform <br>
        ✅ Fast Results <br>
        ✅ Daily Updates <br>
        ⏳ Limited Access Only
    </div>

    <!-- Form -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

        <input type="text" name="name" placeholder="Enter Your Name" required>

        <input type="tel" name="phone" placeholder="Enter WhatsApp Number" required>

        <!-- 🔥 Redirect after submit -->
        <input type="hidden" name="_redirect" value="https://www.multicric.com/?code=124Sky">

        <button type="submit" class="btn">🚀 Get Access Now</button>

    </form>

    <p class="small">🔒 Your details are safe & secure</p>

    <!-- Website -->
    <a href="https://www.multicric.com/?code=124Sky" class="btn">
        🌐 Visit Website
    </a>

    <!-- Telegram -->
    <a href="https://t.me/multicric124sky" class="btn">
        📲 Join Telegram
    </a>

    <!-- Footer -->
    <div class="footer">© 2025 multicric </div>

</div>

</div>

</body>
</html>
