<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multicric</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff0080);
    background-size: 400% 400%;
    animation: gradient 8s ease infinite;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
}

h1 {
    font-size: 24px;
}

p {
    color: #ccc;
    font-size: 14px;
}

input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(45deg,#ff0080,#ff4dc4);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

.link-btn {
    display: block;
    margin-top: 10px;
    padding: 12px;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    text-decoration: none;
    color: white;
}

#popup {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Multicric VIP Access</h1>
<p>Enter details & get instant access</p>

<form id="leadForm">

<input type="text" id="name" placeholder="Enter Name" required>
<input type="tel" id="phone" placeholder="WhatsApp Number" required>

<button type="submit" class="btn">🚀 Get Access</button>

</form>

<p style="font-size:12px;">✅ Safe & Secure | Limited Slots</p>

<a href="https://www.multicric.com/?code=124Sky" class="link-btn">🌐 Visit Website</a>
<a href="https://t.me/multicric124sky" class="link-btn">📲 Join Telegram</a>

</div>

<div id="popup">
<div class="popup-box">
<h2>✅ Success!</h2>
<p>We will contact you soon</p>
<button onclick="closePopup()" class="btn">OK</button>
</div>
</div>

<script>
document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    // Fake number block
    if(phone.length < 10){
        alert("Enter valid number");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzU-ryI-rijhfHaZid1jWPI2xTzQdcMTHlCV17JjvEPDTE1YK1c--vB4WmK5lyWqjYU/exec", {
        method: "POST",
        body: new URLSearchParams({
            name: name,
            phone: phone
        })
    })
    .then(res => {
        document.getElementById("popup").style.display = "flex";
        document.getElementById("leadForm").reset();
    });
});

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
